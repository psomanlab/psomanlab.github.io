<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soman Lab — Supplementary Information</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,600;0,8..60,700;1,8..60,400&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
  <style>
    /* ============================================
       DESIGN TOKENS
       ============================================ */
    :root {
      --bg: #faf9f6;
      --bg-alt: #f0eee9;
      --text: #1a1a1a;
      --text-muted: #5c5c5c;
      --accent: #c4552a;
      --accent-dark: #9e3f1b;
      --accent-light: #fbeee8;
      --border: #d4d0c8;
      --white: #ffffff;
      --serif: 'Source Serif 4', Georgia, serif;
      --sans: 'IBM Plex Sans', -apple-system, sans-serif;
      --mono: 'IBM Plex Mono', monospace;
      --max-w: 1200px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    /* ============================================
       DARK MODE
       ============================================ */
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #141413;
        --bg-alt: #1e1e1c;
        --text: #e8e6e1;
        --text-muted: #a09a92;
        --accent: #e0845c;
        --accent-dark: #eda07e;
        --accent-light: rgba(224,132,92,0.12);
        --border: #2e2d2a;
        --white: #1c1c1a;
      }
      nav {
        background: rgba(20, 20, 19, 0.92) !important;
      }
      .pub-card:hover {
        box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      }
      .contents-card:hover {
        box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      }
      .video-card:hover {
        box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      }
      .video-card video {
        background: #000;
      }
      .avi-placeholder {
        background: linear-gradient(135deg, #0e0e0e 0%, #1a1a1a 100%);
      }
      .avi-placeholder a {
        background: rgba(255,255,255,0.07);
        color: #aaa;
      }
      .avi-placeholder a:hover {
        background: rgba(255,255,255,0.13);
      }
      .file-row:hover { background: #222220; }
      .md tbody tr:hover { background: #222220; }
      .md thead { background: var(--accent-light); }
    }
    body {
      font-family: var(--sans);
      font-weight: 400;
      color: var(--text);
      background: var(--bg);
      line-height: 1.7;
      font-size: 16px;
      min-height: 100vh;
    }

    /* ============================================
       NAV
       ============================================ */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(250, 249, 246, 0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    nav .nav-inner {
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 0.75rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1.5rem;
    }
    .nav-brand {
      font-family: var(--serif);
      font-weight: 600;
      font-size: 1rem;
      color: var(--accent-dark);
      text-decoration: none;
      letter-spacing: -0.02em;
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
    }
    .nav-right {
      font-family: var(--mono);
      font-size: 0.72rem;
      font-weight: 500;
      color: var(--text-muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* ============================================
       HERO (landing)
       ============================================ */
    .hero {
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 5rem 2rem 3rem;
    }
    .hero .lab-tag {
      display: inline-block;
      font-family: var(--mono);
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--accent);
      background: var(--accent-light);
      padding: 0.3rem 0.75rem;
      border-radius: 4px;
      margin-bottom: 1.25rem;
      letter-spacing: 0.04em;
    }
    .hero h1 {
      font-family: var(--serif);
      font-size: clamp(2rem, 4vw, 3rem);
      font-weight: 700;
      line-height: 1.2;
      letter-spacing: -0.025em;
      color: var(--text);
      max-width: 850px;
      margin-bottom: 1.5rem;
    }
    .hero .subtitle {
      font-size: 1.1rem;
      color: var(--text-muted);
      max-width: 720px;
      line-height: 1.75;
    }

    /* ============================================
       PUBLICATION SELECTOR CARDS
       ============================================ */
    .pub-grid {
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 0 2rem 5rem;
      display: grid;
      grid-template-columns: 1fr;
      gap: 1rem;
    }
    .pub-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.5rem 1.75rem;
      cursor: pointer;
      transition: box-shadow 0.25s, transform 0.25s, border-color 0.25s;
      display: flex;
      align-items: flex-start;
      gap: 1.4rem;
      text-decoration: none;
      color: inherit;
    }
    .pub-card:hover {
      border-color: var(--accent);
      box-shadow: 0 4px 20px rgba(0,0,0,0.06);
      transform: translateY(-2px);
    }
    .pub-num {
      font-family: var(--serif);
      font-size: 2.2rem;
      font-weight: 300;
      color: var(--accent);
      line-height: 1;
      flex-shrink: 0;
      width: 2.5rem;
      text-align: center;
      padding-top: 0.1rem;
    }
    .pub-body { flex: 1; min-width: 0; }
    .pub-body h3 {
      font-family: var(--serif);
      font-size: 1.15rem;
      font-weight: 600;
      line-height: 1.35;
      letter-spacing: -0.015em;
      margin-bottom: 0.5rem;
    }
    .pub-meta {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    .pub-tag {
      font-family: var(--mono);
      font-size: 0.7rem;
      font-weight: 500;
      padding: 0.15rem 0.55rem;
      border-radius: 4px;
      background: var(--accent-light);
      color: var(--accent);
    }
    .pub-repo-name {
      font-size: 0.78rem;
      color: var(--text-muted);
    }
    .pub-arrow {
      margin-left: auto;
      flex-shrink: 0;
      color: var(--border);
      transition: transform 0.2s, color 0.2s;
      align-self: center;
    }
    .pub-card:hover .pub-arrow { transform: translateX(3px); color: var(--accent); }

    /* ============================================
       SECTION COMMON (detail view)
       ============================================ */
    .detail-wrap {
      display: none;
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 0 2rem;
    }
    .detail-wrap.active { display: block; }

    .detail-hero {
      padding: 2.5rem 0 2rem;
    }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-family: var(--sans);
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-muted);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      margin-bottom: 1.5rem;
      transition: color 0.2s;
    }
    .back-btn:hover { color: var(--accent); }

    .detail-hero .lab-tag {
      display: inline-block;
      font-family: var(--mono);
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--accent);
      background: var(--accent-light);
      padding: 0.3rem 0.75rem;
      border-radius: 4px;
      margin-bottom: 1rem;
      letter-spacing: 0.04em;
    }
    .detail-hero h1 {
      font-family: var(--serif);
      font-size: clamp(1.7rem, 3.5vw, 2.5rem);
      font-weight: 700;
      line-height: 1.2;
      letter-spacing: -0.025em;
      margin-bottom: 1rem;
      max-width: 850px;
    }
    .detail-hero .subtitle {
      font-size: 1rem;
      color: var(--text-muted);
      line-height: 1.75;
    }
    .detail-hero .subtitle a {
      color: var(--accent);
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .detail-section {
      padding: 2.5rem 0;
    }
    .detail-section + .detail-section { padding-top: 0.5rem; }

    .section-label {
      font-family: var(--mono);
      font-size: 0.72rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--accent);
      margin-bottom: 0.5rem;
    }
    .detail-section h2 {
      font-family: var(--serif);
      font-size: 1.75rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 1.25rem;
      color: var(--text);
    }

    /* ============================================
       CONTENTS GRID (folders)
       ============================================ */
    .contents-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 1.25rem;
      margin-top: 1rem;
    }
    .contents-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.5rem;
      transition: box-shadow 0.25s, transform 0.25s;
    }
    .contents-card:hover {
      box-shadow: 0 4px 20px rgba(0,0,0,0.06);
      transform: translateY(-2px);
    }
    .card-icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: var(--accent-light);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 0.85rem;
      font-size: 1.1rem;
    }
    .contents-card h3 {
      font-family: var(--sans);
      font-weight: 600;
      font-size: 1rem;
      margin-bottom: 0.4rem;
      color: var(--text);
    }
    .contents-card p {
      font-size: 0.88rem;
      color: var(--text-muted);
      line-height: 1.6;
    }
    .contents-card .card-link {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      margin-top: 0.75rem;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--accent);
      text-decoration: none;
    }
    .contents-card .card-link:hover { text-decoration: underline; }

    /* ============================================
       VIDEO GRID
       ============================================ */
    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(480px, 1fr));
      gap: 1.5rem;
      margin-top: 1rem;
    }
    .video-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      transition: box-shadow 0.25s;
    }
    .video-card:hover {
      box-shadow: 0 4px 20px rgba(0,0,0,0.06);
    }
    .video-card video {
      width: 100%;
      display: block;
      background: #0a0a0a;
      aspect-ratio: 16/9;
      object-fit: contain;
    }
    .video-caption {
      padding: 0.9rem 1.15rem;
      font-size: 0.88rem;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
    }
    .video-caption strong {
      color: var(--text);
      font-weight: 600;
    }
    .video-caption a {
      font-size: 0.8rem;
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
      white-space: nowrap;
    }
    .video-caption a:hover { text-decoration: underline; }
    /* AVI fallback card */
    .avi-placeholder {
      width: 100%;
      aspect-ratio: 16/9;
      background: linear-gradient(135deg, #1a1a1a 0%, #2a2a2a 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      color: #888;
      font-size: 0.85rem;
    }
    .avi-placeholder .avi-icon {
      font-size: 2rem;
      opacity: 0.6;
    }
    .avi-placeholder span { font-size: 0.78rem; }
    .avi-placeholder a {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      margin-top: 0.25rem;
      padding: 0.4rem 1rem;
      border-radius: 5px;
      background: rgba(255,255,255,0.1);
      color: #ccc;
      text-decoration: none;
      font-size: 0.82rem;
      font-weight: 500;
      transition: background 0.2s;
    }
    .avi-placeholder a:hover { background: rgba(255,255,255,0.18); }

    /* ============================================
       FILES LIST (non-video, non-folder)
       ============================================ */
    .files-list {
      margin-top: 1rem;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    .files-list-header {
      padding: 0.7rem 1.25rem;
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      background: var(--bg-alt);
      border-bottom: 1px solid var(--border);
    }
    .file-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.55rem 1.25rem;
      border-bottom: 1px solid #eae8e3;
      font-size: 0.88rem;
      transition: background 0.15s;
    }
    .file-row:last-child { border-bottom: none; }
    .file-row:hover { background: #faf8f5; }
    .file-row a {
      color: var(--text);
      text-decoration: none;
      flex: 1;
      word-break: break-all;
    }
    .file-row a:hover { color: var(--accent); }
    .file-row .f-icon {
      flex-shrink: 0;
      font-size: 0.85rem;
      color: var(--text-muted);
    }
    .file-row .f-badge {
      flex-shrink: 0;
      font-family: var(--mono);
      font-size: 0.65rem;
      padding: 0.1rem 0.4rem;
      border-radius: 3px;
      background: var(--accent-light);
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    /* ============================================
       README CONTENT
       ============================================ */
    .readme-wrap {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 2rem 2.5rem;
      margin-top: 1rem;
      overflow-x: auto;
    }
    .readme-wrap .loading-msg {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      color: var(--text-muted);
      font-size: 0.92rem;
      gap: 0.6rem;
    }
    .readme-wrap .no-readme {
      text-align: center;
      padding: 2.5rem 1rem;
      color: var(--text-muted);
      font-style: italic;
      font-size: 0.95rem;
    }
    /* Markdown rendering */
    .md h1 { font-family: var(--serif); font-size: 1.6rem; font-weight: 700; margin: 0.5rem 0 0.8rem; letter-spacing: -0.02em; line-height: 1.3; }
    .md h2 { font-family: var(--serif); font-size: 1.3rem; font-weight: 600; margin: 2rem 0 0.75rem; letter-spacing: -0.015em; padding-bottom: 0.4rem; border-bottom: 1px solid var(--border); }
    .md h3 { font-size: 1.05rem; font-weight: 600; margin: 1.5rem 0 0.5rem; }
    .md p { margin: 0.6rem 0; font-size: 0.92rem; line-height: 1.75; color: var(--text-muted); }
    .md a { color: var(--accent); text-decoration: underline; text-underline-offset: 2px; }
    .md ul, .md ol { padding-left: 1.4rem; margin: 0.5rem 0; font-size: 0.92rem; color: var(--text-muted); }
    .md li { margin: 0.3rem 0; line-height: 1.65; }
    .md li ul { margin: 0.2rem 0; }
    .md code { font-family: var(--mono); font-size: 0.82rem; background: var(--bg-alt); padding: 0.15rem 0.45rem; border-radius: 4px; }
    .md pre { background: var(--bg-alt); padding: 1rem 1.25rem; border-radius: 8px; overflow-x: auto; margin: 0.8rem 0; font-size: 0.82rem; }
    .md pre code { background: none; padding: 0; }
    .md table { width: 100%; border-collapse: collapse; margin: 1rem 0; font-size: 0.85rem; table-layout: fixed; }
    .md thead { background: var(--accent-light); }
    .md th { font-weight: 600; text-align: left; padding: 0.65rem 0.85rem; border-bottom: 2px solid var(--border); font-size: 0.82rem; word-wrap: break-word; overflow-wrap: break-word; }
    .md td { padding: 0.55rem 0.85rem; border-bottom: 1px solid #eae8e3; word-wrap: break-word; overflow-wrap: break-word; }
    .md tbody tr:last-child td { border-bottom: none; }
    .md tbody tr:hover { background: #faf8f5; }
    .md strong { font-weight: 600; color: var(--text); }
    .md img { max-width: 100%; border-radius: 6px; margin: 0.8rem 0; }

    /* ============================================
       SPINNER
       ============================================ */
    .spinner {
      display: inline-block;
      width: 15px; height: 15px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ============================================
       FOOTER
       ============================================ */
    footer {
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 2.5rem 2rem;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    footer p {
      font-size: 0.82rem;
      color: var(--text-muted);
    }
    footer a {
      color: var(--accent);
      text-decoration: none;
    }
    footer a:hover { text-decoration: underline; }

    /* ============================================
       RESPONSIVE
       ============================================ */
    @media (max-width: 640px) {
      .hero { padding: 3rem 1.25rem 2rem; }
      .pub-grid { padding: 0 1.25rem 3rem; }
      .detail-wrap { padding: 0 1.25rem; }
      nav .nav-inner { padding: 0.65rem 1.25rem; }
      .pub-card { padding: 1.15rem; gap: 1rem; }
      .pub-num { font-size: 1.6rem; width: 2rem; }
      .video-grid { grid-template-columns: 1fr; }
      .readme-wrap { padding: 1.5rem; }
      footer { padding: 2rem 1.25rem; }
    }
    @media (max-width: 540px) {
      .video-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- ====== NAV ====== -->
  <nav>
    <div class="nav-inner">
      <button class="nav-brand" onclick="showLanding()">Soman Lab</button>
      <span class="nav-right">Supplementary Information</span>
    </div>
  </nav>

  <!-- ====== LANDING VIEW ====== -->
  <div id="landing-view">
    <header class="hero">
      <span class="lab-tag">psomanlab</span>
      <h1>Supplementary Information</h1>
      <p class="subtitle">
        Browse supplementary files, videos, CAD models, and documentation
        for our published work. Select a publication below to explore its repository.
      </p>
    </header>
    <div class="pub-grid" id="pub-grid"></div>
  </div>

  <!-- ====== DETAIL VIEW ====== -->
  <div class="detail-wrap" id="detail-view">

    <div class="detail-hero">
      <button class="back-btn" onclick="showLanding()">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10 12L6 8l4-4"/></svg>
        All publications
      </button>
      <span class="lab-tag">psomanlab</span>
      <h1 id="detail-title"></h1>
      <p class="subtitle" id="detail-subtitle"></p>
    </div>

    <!-- Dynamic sections injected here -->
    <div id="detail-body"></div>

  </div>

  <!-- ====== FOOTER ====== -->
  <footer>
    <p>&copy; 2026 <a href="https://github.com/psomanlab" target="_blank">Soman Lab</a></p>
    <p><a href="https://github.com/psomanlab" target="_blank">GitHub</a></p>
  </footer>

<!-- ========================================================
     JAVASCRIPT
     ======================================================== -->
<script>
/* ----------------------------------------------------------
   PUBLICATION REGISTRY
   ---------------------------------------------------------- */
var PUBS = [
  {
    num: '1',
    title: 'Assembly of Cell-seeded 3D Printed Hydrogel Modules with Perfusable Channel Networks',
    repo: 'psomanlab/Modular-Assembly',
    tags: ['CAD', 'Videos', 'BOM'],
    branch: 'main'
  },
  {
    num: '2',
    title: 'Capillary on a Chip',
    repo: 'psomanlab/Capillary-on-a-chip',
    tags: ['Videos'],
    branch: 'main'
  },
  {
    num: '3',
    title: 'Perfusable Multiscale Models',
    repo: 'psomanlab/Perfusable-Multiscale-Models',
    tags: ['Videos'],
    branch: 'main'
  }
];

/* ----------------------------------------------------------
   BUILD LANDING CARDS
   ---------------------------------------------------------- */
var grid = document.getElementById('pub-grid');

PUBS.forEach(function(pub) {
  var card = document.createElement('a');
  card.className = 'pub-card';
  card.href = '#' + pub.repo.split('/')[1];
  card.onclick = function(e) { e.preventDefault(); showDetail(pub); };
  card.innerHTML =
    '<div class="pub-num">' + pub.num + '</div>' +
    '<div class="pub-body">' +
      '<h3>' + pub.title + '</h3>' +
      '<div class="pub-meta">' +
        pub.tags.map(function(t){ return '<span class="pub-tag">' + t + '</span>'; }).join('') +
        '<span class="pub-repo-name">' + pub.repo.split('/')[1] + '</span>' +
      '</div>' +
    '</div>' +
    '<svg class="pub-arrow" width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M7 5l5 5-5 5"/></svg>';
  grid.appendChild(card);
});

/* ----------------------------------------------------------
   VIEW SWITCHING
   ---------------------------------------------------------- */
function showLanding() {
  document.getElementById('landing-view').style.display = '';
  document.getElementById('detail-view').classList.remove('active');
  history.pushState(null, '', window.location.pathname);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

async function showDetail(pub) {
  document.getElementById('landing-view').style.display = 'none';
  var dv = document.getElementById('detail-view');
  dv.classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
  history.pushState(null, '', '#' + pub.repo.split('/')[1]);

  // Set hero
  document.getElementById('detail-title').textContent = pub.title;
  document.getElementById('detail-subtitle').innerHTML =
    'View the full repository on <a href="https://github.com/' + pub.repo + '" target="_blank">GitHub &rarr;</a>';

  // Loading state
  document.getElementById('detail-body').innerHTML =
    '<div class="detail-section"><div style="display:flex;align-items:center;gap:0.6rem;color:var(--text-muted);font-size:0.95rem;padding:2rem 0;"><span class="spinner"></span> Loading repository data&hellip;</div></div>';

  // Fetch data
  var results = await Promise.allSettled([
    fetchReadme(pub.repo),
    fetchFiles(pub.repo, pub.branch)
  ]);

  var readmeHtml = results[0].status === 'fulfilled' ? results[0].value : null;
  var tree = results[1].status === 'fulfilled' ? results[1].value : null;

  buildDetailBody(pub, tree, readmeHtml);
}

/* ----------------------------------------------------------
   BUILD DETAIL BODY
   ---------------------------------------------------------- */
function buildDetailBody(pub, tree, readmeHtml) {
  var html = '';
  var folders = {};
  var videos = [];
  var otherFiles = [];

  if (tree) {
    tree.forEach(function(item) {
      var parts = item.path.split('/');
      // Top-level folders
      if (item.type === 'tree' && parts.length === 1) {
        folders[item.path] = [];
      }
      // Files inside folders
      if (item.type === 'blob' && parts.length === 2) {
        if (!folders[parts[0]]) folders[parts[0]] = [];
        folders[parts[0]].push({ name: parts[1], path: item.path });
      }
      // Top-level files
      if (item.type === 'blob' && parts.length === 1) {
        var ext = getExt(item.path);
        if (isVideo(ext)) {
          videos.push({ name: item.path, path: item.path });
        } else {
          otherFiles.push({ name: item.path, path: item.path });
        }
      }
    });

    // Also collect videos from folders
    Object.keys(folders).forEach(function(folder) {
      folders[folder].forEach(function(f) {
        if (isVideo(getExt(f.name))) {
          videos.push({ name: f.name, path: f.path, folder: folder });
        }
      });
    });
  }

  // --- Folders section (non-empty, skip pure-video folders) ---
  var folderNames = Object.keys(folders).sort();
  var nonVideoFolders = folderNames.filter(function(f) {
    return folders[f].some(function(file) { return !isVideo(getExt(file.name)); });
  });

  if (nonVideoFolders.length > 0) {
    html += '<div class="detail-section">';
    html += '<p class="section-label">Repository Contents</p>';
    html += '<h2>What\u2019s Included</h2>';
    html += '<div class="contents-grid">';
    nonVideoFolders.forEach(function(folder) {
      var count = folders[folder].length;
      var exts = {};
      folders[folder].forEach(function(f) {
        var e = getExt(f.name).toUpperCase();
        if (e) exts[e] = true;
      });
      var extStr = Object.keys(exts).join(', ');
      html += '<div class="contents-card">' +
        '<div class="card-icon">&#128193;</div>' +
        '<h3>' + folder + '</h3>' +
        '<p>' + count + ' file' + (count !== 1 ? 's' : '') + (extStr ? ' &middot; ' + extStr : '') + '</p>' +
        '<a class="card-link" href="https://github.com/' + pub.repo + '/tree/' + pub.branch + '/' + folder + '" target="_blank">Browse on GitHub &rarr;</a>' +
      '</div>';
    });
    html += '</div></div>';
  }

  // --- Videos section ---
  if (videos.length > 0) {
    html += '<div class="detail-section">';
    html += '<p class="section-label">Supplementary Videos</p>';
    html += '<h2>Videos</h2>';
    html += '<div class="video-grid">';
    videos.forEach(function(v) {
      var ext = getExt(v.name);
      var rawUrl = 'https://github.com/' + pub.repo + '/raw/' + pub.branch + '/' + v.path;
      var blobUrl = 'https://github.com/' + pub.repo + '/blob/' + pub.branch + '/' + v.path;

      html += '<div class="video-card">';
      if (ext === 'mp4' || ext === 'webm') {
        html += '<video controls preload="metadata">' +
          '<source src="' + rawUrl + '" type="video/' + ext + '">' +
          'Your browser does not support this video.' +
        '</video>';
      } else {
        // AVI / other formats can't play in browser
        html += '<div class="avi-placeholder">' +
          '<div class="avi-icon">&#127916;</div>' +
          '<span>.' + ext.toUpperCase() + ' &mdash; not playable in browser</span>' +
          '<a href="' + rawUrl + '" download>&#11015; Download to view</a>' +
        '</div>';
      }
      html += '<div class="video-caption">' +
        '<strong>' + v.name + '</strong>' +
        '<a href="' + rawUrl + '" download>Download</a>' +
      '</div>';
      html += '</div>';
    });
    html += '</div></div>';
  }

  // --- README section ---
  html += '<div class="detail-section">';
  html += '<p class="section-label">Documentation</p>';
  html += '<h2>README</h2>';
  html += '<div class="readme-wrap">';
  if (readmeHtml) {
    html += '<div class="md">' + readmeHtml + '</div>';
  } else {
    html += '<div class="no-readme">No README found for this repository.</div>';
  }
  html += '</div></div>';

  // --- Other files section ---
  if (otherFiles.length > 0) {
    html += '<div class="detail-section">';
    html += '<p class="section-label">Additional Files</p>';
    html += '<h2>Other Files</h2>';
    html += '<div class="files-list">';
    html += '<div class="files-list-header">Top-level files</div>';
    otherFiles.sort(function(a,b){ return a.name.localeCompare(b.name); }).forEach(function(f) {
      var ext = getExt(f.name);
      var blobUrl = 'https://github.com/' + pub.repo + '/blob/' + pub.branch + '/' + f.path;
      html += '<div class="file-row">' +
        '<span class="f-icon">' + getIcon(ext) + '</span>' +
        '<a href="' + blobUrl + '" target="_blank">' + f.name + '</a>' +
        (ext ? '<span class="f-badge">' + ext + '</span>' : '') +
      '</div>';
    });
    html += '</div></div>';
  }

  // Inject
  var body = document.getElementById('detail-body');
  body.innerHTML = html;

  // Fix relative links in rendered README
  body.querySelectorAll('.md a[href]').forEach(function(a) {
    var href = a.getAttribute('href');
    if (href && !href.startsWith('http') && !href.startsWith('#') && !href.startsWith('mailto:')) {
      a.setAttribute('href', 'https://github.com/' + pub.repo + '/blob/' + pub.branch + '/' + href);
      a.setAttribute('target', '_blank');
    }
  });
}

/* ----------------------------------------------------------
   GITHUB API
   ---------------------------------------------------------- */
async function fetchReadme(repo) {
  try {
    var res = await fetch('https://api.github.com/repos/' + repo + '/readme', {
      headers: { 'Accept': 'application/vnd.github.v3+json' }
    });
    if (!res.ok) return null;
    var data = await res.json();
    var raw = atob(data.content);
    var decoded = new TextDecoder().decode(
      Uint8Array.from(raw, function(c) { return c.charCodeAt(0); })
    );
    return marked.parse(decoded);
  } catch (e) {
    return null;
  }
}

async function fetchFiles(repo, branch) {
  try {
    var res = await fetch('https://api.github.com/repos/' + repo + '/git/trees/' + branch + '?recursive=1', {
      headers: { 'Accept': 'application/vnd.github.v3+json' }
    });
    if (!res.ok) return null;
    var data = await res.json();
    return data.tree || [];
  } catch (e) {
    return null;
  }
}

/* ----------------------------------------------------------
   HELPERS
   ---------------------------------------------------------- */
function getExt(name) {
  var parts = name.split('.');
  return parts.length > 1 ? parts.pop().toLowerCase() : '';
}

function isVideo(ext) {
  return ['mp4','avi','mov','mkv','webm','m4v','wmv'].indexOf(ext) !== -1;
}

function getIcon(ext) {
  if (isVideo(ext)) return '&#127916;';
  if (['step','stp','stl','3mf','obj'].indexOf(ext) !== -1) return '&#9881;';
  if (['md','txt','rst'].indexOf(ext) !== -1) return '&#128196;';
  if (ext === 'pdf') return '&#128203;';
  return '&#128196;';
}

/* ----------------------------------------------------------
   DEEP LINKING  /  HISTORY
   ---------------------------------------------------------- */
function checkHash() {
  var hash = window.location.hash.replace('#', '');
  if (hash) {
    var match = PUBS.find(function(p) { return p.repo.split('/')[1] === hash; });
    if (match) showDetail(match);
  }
}

window.addEventListener('popstate', function() {
  if (!window.location.hash) showLanding();
  else checkHash();
});

marked.setOptions({ breaks: true, gfm: true });
checkHash();
</script>
